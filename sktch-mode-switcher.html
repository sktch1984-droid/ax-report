<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKTCH 어시스턴트 — 모드 전환 데모</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{--red:#EA002C;--orange:#FF5A3C;--grad:linear-gradient(135deg,#EA002C,#FF5A3C);--ink:#15151a;--ink3:#9a9aa4;--line:#e7e7ec;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  html,body{height:100%;}
  body{font-family:'Pretendard',system-ui,sans-serif;background:#0d0d10;color:#fff;display:flex;flex-direction:column;overflow:hidden;}
  .bar{height:60px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:#0d0d10;border-bottom:1px solid #20202a;}
  .bar .lhs{display:flex;align-items:center;gap:11px;}
  .bar .mark{width:28px;height:28px;border-radius:8px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;}
  .bar .ttl{font-size:14px;font-weight:700;letter-spacing:-.2px;}
  .bar .ttl small{display:block;font-size:10.5px;color:#7a7a86;font-weight:500;margin-top:1px;}
  .flag{display:flex;align-items:center;gap:9px;}
  .flagtag{font-size:10.5px;color:#7a7a86;font-family:ui-monospace,monospace;}
  .seg{display:flex;background:#17171e;border:1px solid #26262f;border-radius:11px;padding:3px;gap:3px;}
  .seg button{border:none;background:transparent;color:#9a9aa4;font-family:inherit;font-size:12.5px;font-weight:700;padding:8px 16px;border-radius:8px;cursor:pointer;transition:.16s;display:flex;align-items:center;gap:7px;}
  .seg button .d{width:7px;height:7px;border-radius:50%;background:#4a4a55;}
  .seg button.on{background:var(--grad);color:#fff;box-shadow:0 4px 14px rgba(234,0,44,.4);}
  .seg button.on .d{background:#fff;}
  .stage{flex:1;position:relative;min-height:0;background:radial-gradient(1100px 560px at 82% -8%,#ffe9e4 0%,rgba(255,233,228,0) 55%),radial-gradient(900px 520px at 0% 100%,#eef1ff 0%,rgba(238,241,255,0) 50%),#f1f1f4;}
  #stage{width:100%;height:100%;border:none;display:block;position:relative;z-index:2;background:transparent;}
  #bgFrame{position:absolute;inset:0;width:100%;height:100%;border:none;z-index:0;}
  #bgVeil{display:none;}
  #bgToggle{position:absolute;left:16px;bottom:16px;z-index:5;font:600 11.5px Pretendard,sans-serif;background:rgba(255,255,255,.9);color:#16161a;border:1px solid #e3e3ea;border-radius:20px;padding:7px 13px;cursor:pointer;backdrop-filter:blur(6px);box-shadow:0 4px 14px rgba(0,0,0,.08);}
  .modecap{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);font-size:11px;color:#6a6a76;background:rgba(20,20,26,.8);padding:6px 14px;border-radius:20px;backdrop-filter:blur(6px);z-index:5;pointer-events:none;}
  .modecap b{color:#ff8b73;}
</style>
</head>

      <div class="mark">S</div>

    </div>

      </div>
    </div>
  </div>

      <div style="display:flex;gap:18px;margin-top:38px;">
        <div style="width:200px;height:120px;border-radius:16px;background:#fff;border:1px solid #ececf0;"></div>
        <div style="width:200px;height:120px;border-radius:16px;background:#fff;border:1px solid #ececf0;"></div>
        <div style="width:200px;height:120px;border-radius:16px;background:#fff;border:1px solid #ececf0;"></div>

  function decode(b64){const bin=atob(b64);const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));return new TextDecoder('utf-8').decode(bytes);}
  const HTML={ext:decode(EXT),int:decode(INT)};
  function setMode(m){
    document.getElementById('stage').srcdoc=HTML[m];
    document.getElementById('btnExt').classList.toggle('on',m==='ext');
    document.getElementById('btnInt').classList.toggle('on',m==='int');
    document.getElementById('flagtag').textContent='user_flag = "'+(m==='ext'?'external':'internal')+'"';
    document.getElementById('cap').innerHTML = m==='ext'
      ? '외부(1차) 사용자 — 방문자 · 지원/참여 스타트업'
      : '내부(2차) 사용자 — <b>SKT 사업부 담당자</b> 소싱 모드';
  }
  setMode('ext');

  // --- background: live SKTCH iframe  <->  bright demo fallback ---
  (function(){
    var bf=document.getElementById('bgFrame'), demo=document.getElementById('bgDemo'), btn=document.getElementById('bgToggle'), live=true;
    function setBg(on){ live=on; bf.style.display=on?'block':'none'; demo.style.display=on?'none':'block'; btn.textContent = on ? '배경: 실제 사이트 (켜짐)' : '배경: 데모 (켜짐)'; }
    // if the live site refuses to load, drop to the bright demo bg automatically
    bf.addEventListener('error', function(){ setBg(false); });
    btn.addEventListener('click', function(){ setBg(!live); });
    setBg(true);
  })();
</script>
